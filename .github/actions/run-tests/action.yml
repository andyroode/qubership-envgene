name: 'Run Tests'
description: 'Run Qubership Envgene tests'

inputs:
  python-version:
    description: 'Python version to use for tests'
    required: false
    default: '3.12'

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure package sources
      shell: bash
      run: |
        if [ -f build_envgene/build/pip.conf ]; then
          mkdir -p /etc/pip
          cp build_envgene/build/pip.conf /etc/pip.conf
        fi

    - name: Install system dependencies
      shell: bash
      run: |
        apt-get update && apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            git \
            && rm -rf /var/lib/apt/lists/*

        curl -LO https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
        mv sops-v3.9.0.linux.amd64 /usr/local/bin/sops
        chmod +x /usr/local/bin/sops

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install --no-cache-dir --upgrade pip "setuptools==81" wheel
        pip install --no-cache-dir -r build_envgene/build/requirements.txt \
        -r build_effective_set_generator/build/requirements.txt \
        -r build_pipegene/build/requirements.txt \
        -r creds_rotation/build/requirements.txt

        if [ -f python/build_modules.sh ]; then
            chmod +x python/build_modules.sh
            ./python/build_modules.sh
        fi

        pip install --no-cache-dir -e "python/artifact-searcher[dev]"
        pip install --no-cache-dir -e "python/envgene[dev]"

    - name: Configure test environment
      shell: bash
      run: |
        echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> "${GITHUB_ENV}"

    - name: ENVGENE HELPER test
      shell: bash
      run: |
        cd python/envgene/envgenehelper
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../../junit.xml
        cd ../../..
        mv junit.xml junit_envgenehelper.xml

    - name: PIPEGENE test
      shell: bash
      run: |
        cd build_pipegene/scripts
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../junit.xml
        cd ../..
        mv junit.xml junit_pipegene.xml

    - name: ARTIFACT SEARCHER test
      shell: bash
      run: |
        cd python/artifact-searcher/artifact_searcher
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../../junit.xml
        cd ../../..
        mv junit.xml junit_artifact_searcher.xml

    - name: EXTERNAL CRED PROVISION test
      shell: bash
      run: |
        cd python/external-cred-provision
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../junit.xml
        cd ../..
        mv junit.xml junit_external_cred_provision.xml

    - name: BG MANAGE test
      shell: bash
      env:
        FULL_ENV_NAME: "sdp-dev/env-1"
        BG_STATE: ""
        CI_PROJECT_DIR: ${GITHUB_WORKSPACE}
      run: |
        cd scripts/bg_manage
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../junit.xml
        cd ../..
        mv junit.xml junit_bg_manage.xml

    - name: BUILD ENV test
      shell: bash
      run: |
        cd scripts/build_env
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../junit.xml
        cd ../..
        mv junit.xml junit_build_env.xml

    - name: BUILD CRED ROTATION test
      shell: bash
      run: |
        cd creds_rotation/scripts
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../junit.xml
        cd ../..
        mv junit.xml junit_cred_rotation.xml

    - name: SBOMS RETENTION POLICY test
      shell: bash
      run: |
        cd build_effective_set_generator/scripts
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../junit.xml
        cd ../..
        mv junit.xml junit_sbom_retention.xml

    - name: BUILD ENVGENE SCRIPTS test
      shell: bash
      run: |
        cd build_envgene/scripts
        pytest --capture=no -W ignore::DeprecationWarning --junitxml=../../junit.xml
        cd ../..
        mv junit.xml junit_build_envgene_scripts.xml

    - name: Merge test results
      shell: bash
      run: |
        junitparser merge junit_*.xml junit.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: junit.xml

    - name: Upload test environments
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test_artifact
        path: tmp/
