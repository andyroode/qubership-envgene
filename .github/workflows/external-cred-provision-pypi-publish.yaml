name: "Publish to PyPI: external-cred-provision"

run-name: "Publish to PyPI: external-cred-provision v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in strict semver format: 0.0.0"
        required: true
        type: string

permissions:
  contents: read

env:
  PROJECT_DIR: python/external-cred-provision
  PACKAGE_NAME: external-cred-provision
  CLI_NAME: external-cred-provision

jobs:
  validate-input:
    name: Validate release input
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure workflow is running from main
        if: ${{ github.ref_name != 'main' }}
        run: |
          echo "ERROR: Publishing is allowed only from main branch."
          echo "Current branch/ref: $GITHUB_REF_NAME"
          exit 1

      - name: Validate semver input
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Package: ${PACKAGE_NAME}"
          echo "CLI: ${CLI_NAME}"
          echo "Validating version: ${VERSION}"

          if [[ ! "${VERSION}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "ERROR: Version must be strict semver: X.Y.Z"
            echo "Examples: 0.1.0, 1.0.0, 2.3.4"
            echo "Not allowed: v1.0.0, 1.0, 1.0.0-rc1, 1.0.0+build, 01.0.0"
            exit 1
          fi

          echo "OK: version '${VERSION}' is valid."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
  
      - name: Install version parser
        run: |
            python -m pip install --upgrade pip
            python -m pip install packaging

      - name: Ensure version is greater than latest PyPI release
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python ".github/scripts/check_pypi_version.py" \
            --package-name "${PACKAGE_NAME}" \
            --version "${VERSION}"

  build-package:
    name: Build package dry-run
    runs-on: ubuntu-latest
    needs: validate-input

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate project structure
        shell: bash
        run: |
          set -euo pipefail

          test -d "${PROJECT_DIR}"
          test -f "${PROJECT_DIR}/pyproject.toml"
          test -d "${PROJECT_DIR}/src/external_cred_provision"

          echo "OK: project structure is valid."

      - name: Set release version in pyproject.toml
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python ".github/scripts/set_pyproject_version.py" \
            --pyproject "${PROJECT_DIR}/pyproject.toml" \
            --package-name "${PACKAGE_NAME}" \
            --version "${VERSION}"

      - name: Show updated pyproject version
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"

          python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f'{data["project"]["name"]} {data["project"]["version"]}')
          PY

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m build

      - name: Check distributions
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m twine check dist/*

      - name: Smoke test installed CLI
        shell: bash
        run: |
            set -euo pipefail

            cd "${PROJECT_DIR}"

            python -m venv .venv-smoke
            source .venv-smoke/bin/activate

            python -m pip install --upgrade pip

            WHEEL_FILE="$(ls dist/*.whl | head -n 1)"
            echo "Installing wheel: ${WHEEL_FILE}"

            python -m pip install "${WHEEL_FILE}"

            echo "Checking CLI entrypoint..."
            external-cred-provision --help

            echo "OK: CLI entrypoint works."   

      - name: List distributions
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          ls -lah dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: external-cred-provision-dist-${{ inputs.version }}
          path: ${{ env.PROJECT_DIR }}/dist/*