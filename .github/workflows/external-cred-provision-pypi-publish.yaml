name: "Publish to PyPI: external-cred-provision"

run-name: "Publish to PyPI: external-cred-provision v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in strict semver format: 0.0.0"
        required: true
        type: string

concurrency:
  group: pypi-external-cred-provision
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_DIR: python/external-cred-provision
  PACKAGE_NAME: external-cred-provision
  CLI_NAME: external-cred-provision

jobs:
  validate-input:
    name: Validate release version
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@fd07e4be49718ebc76b92bcc6adacaf561707e65 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install PyPI version check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install packaging

      - name: Validate semver and PyPI version bump
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          attempt=1
          max_attempts=3

          while true; do
            set +e
            python ".github/scripts/check_pypi_version.py" \
              --package-name "${PACKAGE_NAME}" \
              --version "${VERSION}"
            exit_code=$?
            set -e

            if [[ "${exit_code}" -eq 0 ]]; then
              break
            fi

            if [[ "${exit_code}" -eq 2 && "${attempt}" -lt "${max_attempts}" ]]; then
              echo "PyPI query failed (attempt ${attempt}/${max_attempts}), retrying in 10s..."
              attempt=$((attempt + 1))
              sleep 10
              continue
            fi

            exit "${exit_code}"
          done

  build-package:
    name: Build and verify package
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate-input

    steps:
      - name: Checkout repository
        uses: actions/checkout@fd07e4be49718ebc76b92bcc6adacaf561707e65 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install build, test, and check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Validate project layout
        shell: bash
        run: |
          set -euo pipefail

          test -d "${PROJECT_DIR}"
          test -f "${PROJECT_DIR}/pyproject.toml"
          test -f "${PROJECT_DIR}/README.md"
          test -d "${PROJECT_DIR}/src/external_cred_provision"
          test -f "${PROJECT_DIR}/tests/fixtures/smoke-empty-context.yaml"
          test -f "${PROJECT_DIR}/tests/fixtures/sample-context.yaml"
          grep -q "^${CLI_NAME} =" "${PROJECT_DIR}/pyproject.toml"

          echo "OK: project structure is valid."

      - name: Set release version in pyproject.toml
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python ".github/scripts/set_pyproject_version.py" \
            --pyproject "${PROJECT_DIR}/pyproject.toml" \
            --package-name "${PACKAGE_NAME}" \
            --version "${VERSION}"

      - name: Print release version
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"

          python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f'{data["project"]["name"]} {data["project"]["version"]}')
          PY

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m pip install -e .
          python -m pytest

      - name: Build sdist and wheel
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m build

      - name: Check distribution metadata
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m twine check dist/*

      - name: Smoke test installed wheel and CLI
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"

          wheel_count="$(find dist -maxdepth 1 -name '*.whl' | wc -l)"
          if [[ "${wheel_count}" -ne 1 ]]; then
            echo "ERROR: expected exactly one wheel in dist/, found ${wheel_count}"
            find dist -maxdepth 1 -name '*.whl' -print
            exit 1
          fi

          WHEEL_FILE="$(find dist -maxdepth 1 -name '*.whl' | head -n 1)"

          python -m venv .venv-smoke
          source .venv-smoke/bin/activate

          python -m pip install --upgrade pip
          echo "Installing wheel: ${WHEEL_FILE}"
          python -m pip install "${WHEEL_FILE}"

          command -v "${CLI_NAME}"
          "${CLI_NAME}" --help

          echo "Running dry-run smoke test..."
          "${CLI_NAME}" --dry-run tests/fixtures/smoke-empty-context.yaml

          echo "OK: CLI entrypoint works."

      - name: List built distributions
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          ls -lah dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: external-cred-provision-dist-${{ inputs.version }}
          path: ${{ env.PROJECT_DIR }}/dist/*
          retention-days: 14
