name: "Publish to PyPI: external-cred-provision"

run-name: "Publish to PyPI: external-cred-provision v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in strict semver format: 0.0.0"
        required: true
        type: string

concurrency:
  group: pypi-external-cred-provision
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_DIR: python/external-cred-provision
  PACKAGE_NAME: external-cred-provision
  CLI_NAME: external-cred-provision
  UPSTREAM_REPO: Netcracker/qubership-envgene
  PYPI_RETRY_ATTEMPTS: 3
  PYPI_RETRY_DELAY_SECONDS: 10

jobs:
  gate:
    name: Determine publish mode
    runs-on: ubuntu-latest
    outputs:
      can_publish: ${{ steps.mode.outputs.can_publish }}

    steps:
      - name: Set build-only or publish mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail

          can_publish=false

          if [[ "${{ github.event.repository.fork }}" != "true" ]] \
            && [[ "${{ github.repository }}" == "${UPSTREAM_REPO}" ]] \
            && [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            can_publish=true
          fi

          echo "can_publish=${can_publish}" >> "${GITHUB_OUTPUT}"

          if [[ "${can_publish}" == "true" ]]; then
            echo "Publish mode: PyPI upload and repository version sync are enabled."
          else
            echo "Build-only mode: build, test, and artifact upload will run."
            echo "Publish and repository version sync are skipped."
            echo "Repository: ${{ github.repository }}"
            echo "Ref: ${{ github.ref }}"
          fi

  validate-input:
    name: Validate release version
    needs: gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@fd07e4be49718ebc76b92bcc6adacaf561707e65 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ${{ env.PROJECT_DIR }}/pyproject.toml

      - name: Install PyPI version check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install packaging

      - name: Validate semver format
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python ".github/scripts/check_pypi_version.py" \
            --package-name "${PACKAGE_NAME}" \
            --version "${VERSION}" \
            --semver-only

      - name: Validate PyPI version bump
        if: needs.gate.outputs.can_publish == 'true'
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          attempt=1
          max_attempts="${PYPI_RETRY_ATTEMPTS}"

          while true; do
            set +e
            python ".github/scripts/check_pypi_version.py" \
              --package-name "${PACKAGE_NAME}" \
              --version "${VERSION}"
            exit_code=$?
            set -e

            if [[ "${exit_code}" -eq 0 ]]; then
              break
            fi

            if [[ "${exit_code}" -eq 2 && "${attempt}" -lt "${max_attempts}" ]]; then
              echo "PyPI query failed (attempt ${attempt}/${max_attempts}), retrying in ${PYPI_RETRY_DELAY_SECONDS}s..."
              attempt=$((attempt + 1))
              sleep "${PYPI_RETRY_DELAY_SECONDS}"
              continue
            fi

            exit "${exit_code}"
          done

  build-package:
    name: Build and verify package
    needs: validate-input
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@fd07e4be49718ebc76b92bcc6adacaf561707e65 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ${{ env.PROJECT_DIR }}/pyproject.toml

      - name: Install build, test, and check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Validate project layout
        shell: bash
        run: |
          set -euo pipefail

          test -d "${PROJECT_DIR}"
          test -f "${PROJECT_DIR}/pyproject.toml"
          test -f "${PROJECT_DIR}/README.md"
          test -d "${PROJECT_DIR}/src/external_cred_provision"
          test -f "${PROJECT_DIR}/tests/fixtures/smoke-empty-context.yaml"
          test -f "${PROJECT_DIR}/tests/fixtures/sample-context.yaml"
          grep -q "^${CLI_NAME} =" "${PROJECT_DIR}/pyproject.toml"

          echo "OK: project structure is valid."

      - name: Set release version in pyproject.toml
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python ".github/scripts/set_pyproject_version.py" \
            --pyproject "${PROJECT_DIR}/pyproject.toml" \
            --package-name "${PACKAGE_NAME}" \
            --version "${VERSION}"

      - name: Print release version
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"

          python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f'{data["project"]["name"]} {data["project"]["version"]}')
          PY

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m pip install -e .
          python -m pytest

      - name: Build sdist and wheel
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m build

      - name: Check distribution metadata
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          python -m twine check dist/*

      - name: Smoke test installed wheel and CLI
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"

          wheel_count="$(find dist -maxdepth 1 -name '*.whl' | wc -l)"
          if [[ "${wheel_count}" -ne 1 ]]; then
            echo "ERROR: expected exactly one wheel in dist/, found ${wheel_count}"
            find dist -maxdepth 1 -name '*.whl' -print
            exit 1
          fi

          WHEEL_FILE="$(find dist -maxdepth 1 -name '*.whl' | head -n 1)"

          python -m venv .venv-smoke
          source .venv-smoke/bin/activate

          python -m pip install --upgrade pip
          echo "Installing wheel: ${WHEEL_FILE}"
          python -m pip install "${WHEEL_FILE}"

          command -v "${CLI_NAME}"
          "${CLI_NAME}" --help

          echo "Running dry-run smoke test..."
          "${CLI_NAME}" --dry-run tests/fixtures/smoke-empty-context.yaml

          echo "OK: CLI entrypoint works."

      - name: List built distributions
        shell: bash
        run: |
          set -euo pipefail

          cd "${PROJECT_DIR}"
          ls -lah dist/

      - name: Upload release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: external-cred-provision-dist-${{ inputs.version }}
          path: ${{ env.PROJECT_DIR }}/dist/*
          retention-days: 14

  publish-package:
    name: Publish to PyPI
    needs:
      - gate
      - build-package
    if: needs.gate.outputs.can_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@fd07e4be49718ebc76b92bcc6adacaf561707e65 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine packaging

      - name: Verify PyPI connectivity and credentials
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_API_USER }}
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          attempt=1
          max_attempts="${PYPI_RETRY_ATTEMPTS}"

          while true; do
            set +e
            python ".github/scripts/check_pypi_credentials.py" \
              --package-name "${PACKAGE_NAME}"
            exit_code=$?
            set -e

            if [[ "${exit_code}" -eq 0 ]]; then
              break
            fi

            if [[ "${exit_code}" -eq 2 && "${attempt}" -lt "${max_attempts}" ]]; then
              echo "PyPI connectivity check failed (attempt ${attempt}/${max_attempts}), retrying in ${PYPI_RETRY_DELAY_SECONDS}s..."
              attempt=$((attempt + 1))
              sleep "${PYPI_RETRY_DELAY_SECONDS}"
              continue
            fi

            exit "${exit_code}"
          done

      - name: Download release artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: external-cred-provision-dist-${{ inputs.version }}
          path: dist

      - name: Validate artifacts to publish
        shell: bash
        run: |
          set -euo pipefail

          wheel_count="$(find dist -maxdepth 1 -name '*.whl' | wc -l)"
          sdist_count="$(find dist -maxdepth 1 -name '*.tar.gz' | wc -l)"

          if [[ "${wheel_count}" -ne 1 ]]; then
            echo "ERROR: expected exactly one wheel to publish, found ${wheel_count}"
            find dist -maxdepth 1 -name '*.whl' -print
            exit 1
          fi

          if [[ "${sdist_count}" -ne 1 ]]; then
            echo "ERROR: expected exactly one sdist to publish, found ${sdist_count}"
            find dist -maxdepth 1 -name '*.tar.gz' -print
            exit 1
          fi

          ls -lah dist/
          echo "OK: publish artifacts are valid."

      - name: Publish package to PyPI
        shell: bash
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_API_USER }}
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail

          attempt=1
          max_attempts="${PYPI_RETRY_ATTEMPTS}"

          while true; do
            set +e
            python -m twine upload --non-interactive dist/*
            exit_code=$?
            set -e

            if [[ "${exit_code}" -eq 0 ]]; then
              break
            fi

            if [[ "${attempt}" -lt "${max_attempts}" ]]; then
              echo "PyPI upload failed (attempt ${attempt}/${max_attempts}), retrying in ${PYPI_RETRY_DELAY_SECONDS}s..."
              attempt=$((attempt + 1))
              sleep "${PYPI_RETRY_DELAY_SECONDS}"
              continue
            fi

            exit "${exit_code}"
          done

      - name: Verify published version on PyPI
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          attempt=1
          max_attempts="${PYPI_RETRY_ATTEMPTS}"

          while true; do
            set +e
            python ".github/scripts/check_pypi_version.py" \
              --package-name "${PACKAGE_NAME}" \
              --version "${VERSION}" \
              --verify-published
            exit_code=$?
            set -e

            if [[ "${exit_code}" -eq 0 ]]; then
              break
            fi

            if [[ "${attempt}" -lt "${max_attempts}" ]] \
              && { [[ "${exit_code}" -eq 2 ]] || [[ "${exit_code}" -eq 3 ]]; }; then
              echo "PyPI verification pending (attempt ${attempt}/${max_attempts}, exit ${exit_code}), retrying in ${PYPI_RETRY_DELAY_SECONDS}s..."
              attempt=$((attempt + 1))
              sleep "${PYPI_RETRY_DELAY_SECONDS}"
              continue
            fi

            exit "${exit_code}"
          done

  sync-repo-version:
    name: Sync repository version
    needs:
      - gate
      - publish-package
    if: needs.gate.outputs.can_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@fd07e4be49718ebc76b92bcc6adacaf561707e65 # v6.0.3

      - name: Set release version in pyproject.toml
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python ".github/scripts/set_pyproject_version.py" \
            --pyproject "${PROJECT_DIR}/pyproject.toml" \
            --package-name "${PACKAGE_NAME}" \
            --version "${VERSION}"

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${PROJECT_DIR}/pyproject.toml"

          if git diff --staged --quiet; then
            echo "OK: repository version already matches release ${VERSION}."
            exit 0
          fi

          git commit -m "chore: bump ${PACKAGE_NAME} version to ${VERSION}"
          git push
          echo "OK: repository version synced to ${VERSION}."
