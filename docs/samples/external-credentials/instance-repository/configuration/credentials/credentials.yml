---
# System Credentials File. EnvGene jobs consume these for their own operation (Git access, registry
# access, CMDB deployer). They are read by EnvGene at generation time, not provisioned into the
# Effective Set, so they do not appear in any effective-set/external-credential file.
#
# System credentials may be local, external, or supplied through a CI/CD variable, mixed freely. Here
# they are all type: external to show the external form. They omit create (read-only: EnvGene reads
# them, it does not write them). secretStore default_store is the vault store in secret-stores.yml
# (only vault and gcp are supported for system credentials).

# integration.yml self_token (EnvGene commits to the instance repository).
self-token-cred:
  type: external
  secretStore: default_store
  remoteRefPath: /vcs/envgene-bot
# integration.yml cp_discovery.gitlab.token (Cloud Passport discovery repository).
cp-discovery-token-cred:
  type: external
  secretStore: default_store
  remoteRefPath: /vcs/cp-discovery
# registry.yml registry authentication (deprecated config, kept to cover every system credential).
registry-cred:
  type: external
  secretStore: default_store
  remoteRefPath: /registry/maven
  properties:
    - name: username
    - name: password
# Artifact Definition and Registry Definition credentialsId (shared, as in the docs example).
artifactory-cred:
  type: external
  secretStore: default_store
  remoteRefPath: /artifactory/qubership
  properties:
    - name: username
    - name: password
