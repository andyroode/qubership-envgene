---
cloud-deploy-cred:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster
dbaas-cluster-dba-cred:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster
  properties:
    - name: username
    - name: password
maas-cred:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster
  properties:
    - name: username
    - name: password
consul-admin-cred:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster
app-db-cred:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster/env/db
  properties:
    - name: username
    - name: password
app-sidecar-token:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster/env/sidecar
ns-deploy-cred:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster/env
tenant-cred:
  type: external
  create: true
  secretStore: default_store
  remoteRefPath: cluster
