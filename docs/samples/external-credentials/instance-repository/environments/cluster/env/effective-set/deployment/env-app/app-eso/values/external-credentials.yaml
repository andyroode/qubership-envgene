---
# External Credential References for an application whose effective SECRET_FLOW is external-values (ESO).
# Path: deployment/<namespace-folder>/<application-name>/values/external-credentials.yaml
DB_ADMIN_USER:
  secretStoreId: default_store
  normalizedSecretName: cluster/env/db/app-db-cred
  secretKeys:
    - remoteKeyName: username
DB_ADMIN_PASSWORD:
  secretStoreId: default_store
  normalizedSecretName: cluster/env/db/app-db-cred
  secretKeys:
    - remoteKeyName: password
INTEGRATION_TOKEN:
  secretStoreId: default_store
  normalizedSecretName: cluster/env/sidecar/app-sidecar-token
CLOUD_DEPLOY_TOKEN:
  secretStoreId: default_store
  normalizedSecretName: cluster/cloud-deploy-cred
DBAAS_CLUSTER_DBA_CREDENTIALS_USERNAME:
  secretStoreId: default_store
  normalizedSecretName: cluster/dbaas-cluster-dba-cred
  secretKeys:
    - remoteKeyName: username
DBAAS_CLUSTER_DBA_CREDENTIALS_PASSWORD:
  secretStoreId: default_store
  normalizedSecretName: cluster/dbaas-cluster-dba-cred
  secretKeys:
    - remoteKeyName: password
MAAS_CREDENTIALS_USERNAME:
  secretStoreId: default_store
  normalizedSecretName: cluster/maas-cred
  secretKeys:
    - remoteKeyName: username
MAAS_CREDENTIALS_PASSWORD:
  secretStoreId: default_store
  normalizedSecretName: cluster/maas-cred
  secretKeys:
    - remoteKeyName: password
CONSUL_ADMIN_TOKEN:
  secretStoreId: default_store
  normalizedSecretName: cluster/consul-admin-cred
