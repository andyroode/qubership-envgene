---
# External Credential Context: create: true + secretStores copy (vault normalization: remoteRefPath/credId).
secretStores:
  default-store:
    type: vault
    url: https://vault.example.com
    mountPath: secret
credentials:
  cloud-deploy-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/cloud-deploy-cred
  dbaas-cluster-dba-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/dbaas-cluster-dba-cred
    properties:
      - name: username
      - name: password
  maas-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/maas-cred
    properties:
      - name: username
      - name: password
  consul-admin-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/consul-admin-cred
  app-db-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/db/app-db-cred
    properties:
      - name: username
      - name: password
  app-sidecar-token:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/sidecar/app-sidecar-token
  ns-deploy-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/env/ns-deploy-cred
    properties:
      - name: username
      - name: password
  tenant-cred:
    secretStoreId: default-store
    normalizedSecretName: cluster/tenant-cred
