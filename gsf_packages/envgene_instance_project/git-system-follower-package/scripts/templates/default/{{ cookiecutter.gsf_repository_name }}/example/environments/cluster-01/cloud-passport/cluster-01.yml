version: 1.5
cloud:
  CLOUD_API_HOST: api.example-cloud.managed.qubership.org
  CLOUD_API_PORT: "6443"
  CLOUD_DEPLOY_TOKEN: cloud-deploy-token
  CLOUD_PUBLIC_HOST: example-cloud.managed.qubership.org
  CLOUD_PRIVATE_HOST: example-cloud.managed.qubership.org
  CLOUD_DASHBOARD_URL: https://dashboard.example-cloud.managed.qubership.org
  CLOUD_PROTOCOL: https
  PRODUCTION_MODE: false
  GRAYLOG_UI_URL: https://graylog-logging-example-cloud.managed.qubership.org
  TRACING_UI_URL: https://jaeger.example-cloud.managed.qubership.org
  GRAFANA_UI_URL: https://grafana-platform-monitoring.example-cloud.managed.qubership.org
  CMDB_URL: https://cloud-deployer.qubership.org
dbaas:
  API_DBAAS_ADDRESS: http://dbaas-aggregator.dbaas:8080
  DBAAS_AGGREGATOR_ADDRESS: https://aggregator-dbaas.example-cloud.managed.qubership.org
  DBAAS_CLUSTER_DBA_CREDENTIALS_USERNAME: ${creds.get("dbaas-cluster-dba-cred").username}
  DBAAS_CLUSTER_DBA_CREDENTIALS_PASSWORD: ${creds.get("dbaas-cluster-dba-cred").password}
maas:
  MAAS_INTERNAL_ADDRESS: http://maas-service.maas:8080
  MAAS_SERVICE_ADDRESS: http://maas-service.maas:8080
  MAAS_CREDENTIALS_USERNAME: ${creds.get("maas-cred").username}
  MAAS_CREDENTIALS_PASSWORD: ${creds.get("maas-cred").password}
consul:
  CONSUL_URL: http://consul-server.consul:8500
  CONSUL_ENABLED: true
  CONSUL_PUBLIC_URL: https://consul.example-cloud.managed.qubership.org
  CONSUL_ADMIN_TOKEN: ${creds.get("consul-admin-cred").secret}
zookeeper:
  ZOOKEEPER_URL: ${ZOOKEEPER_ADDRESS}
  ZOOKEEPER_ADDRESS: zookeeper.zookeeper:2181
storage:
  STORAGE_SERVER_URL: https://s3.qubership.org
  STORAGE_PROVIDER: s3
  STORAGE_REGION: "us-west-2"
  STORAGE_USERNAME: ${creds.get("minio-storage-cred").username}
  STORAGE_PASSWORD: ${creds.get("minio-storage-cred").password}
  CDN_STORAGE_SERVER_URL: ${STORAGE_SERVER_URL}
  CDN_STORAGE_PROVIDER: ${STORAGE_PROVIDER}
  CDN_STORAGE_REGION: ${STORAGE_REGION}
  CDN_STORAGE_USERNAME: ${STORAGE_USERNAME}
  CDN_STORAGE_PASSWORD: ${STORAGE_PASSWORD}
  DOC_STORAGE_SERVER_URL: ${STORAGE_SERVER_URL}
  DOC_STORAGE_PROVIDER: ${STORAGE_PROVIDER}
  DOC_STORAGE_REGION: ${STORAGE_REGION}
  DOC_STORAGE_USERNAME: ${STORAGE_USERNAME}
  DOC_STORAGE_PASSWORD: ${STORAGE_PASSWORD}
  STORAGE_RWO_CLASS: rwo-sc
  STORAGE_RWX_CLASS: rwx-sc
core:
  DEFAULT_TENANT_NAME: default
  DEFAULT_TENANT_ADMIN_LOGIN: user-placeholder-123
  DEFAULT_TENANT_ADMIN_PASSWORD: pass-placeholder-123
  MAVEN_REPO_URL: https://artifactory.qubership.org/
  MAVEN_REPO_NAME: global.mvn.group
  MAVEN_REPO_STAGING_NAME: ${MAVEN_REPO_NAME}
  MAVEN_REPO_DEV_NAME: ${MAVEN_REPO_NAME}
global:
  MONITORING_ENABLED: "true"
  TRACING_ENABLED: "true"
  TRACING_HOST: diagnostic-agent