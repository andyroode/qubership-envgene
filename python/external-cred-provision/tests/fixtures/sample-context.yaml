credentials:
  app-cred:
    vals: "ref+vault://kv/path/to/app-cred"
    strategy: create_if_absent
    data:
      username: username
      password: password

  readonly-cred:
    vals: "ref+vault://kv/path/to/readonly-cred"
    strategy: create_if_absent
    data:
      username: username
      password: _generateValue

  connection-secret:
    vals: "ref+vault://kv/path/to/connection-secret"
    strategy: create_if_absent
    data:
      value: token

  monitoring-token:
    vals: "ref+vault://kv/path/to/monitoring-token"
    strategy: fail_if_absent

  gcp-license-token:
    vals: "ref+gcpsecrets://example-project/path/to/license-token"
    strategy: create_if_absent
    data: _generateValue

  smtp-relay-cred:
    vals: "ref+gcpsecrets://example-project/path/to/smtp-relay-cred"
    strategy: create_if_absent
    data:
      username: smtp_user
      password: _generateValue

  third-party-api-token:
    vals: "ref+gcpsecrets://example-project/path/to/api-token"
    strategy: fail_if_absent

  jwt-signing-key:
    vals: "ref+awssecrets://example/path/to/jwt-signing-key?region=us-east-1"
    strategy: overwrite
    data: _generateValue
