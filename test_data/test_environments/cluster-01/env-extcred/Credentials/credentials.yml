app-db-cred: # external credential template
  type: "external"
  secretStore: "azure_store"
  remoteRefPath: "cluster_01_env_extcred/env-extcred"
  create: false
  properties:
    - name: "username"
    - name: "password"
app-dbaas-cred: # cloud passport: ext-mode version: 1.5
  type: "external"
  secretStore: "azure_store"
  create: false
  properties:
    - name: "username"
    - name: "password"
app-maas-cred: # cloud passport: ext-mode version: 1.5
  type: "external"
  secretStore: "azure_store"
  create: true
  properties:
    - name: "username"
    - name: "password"
app-sidecar-token: # cloud passport: ext-mode version: 1.5
  type: "external"
  secretStore: "vault_store"
  remoteRefPath: "{{ current_env.cloud }}/{{ current_env.name }}/envgene"
app-test-cred: # external credential template
  type: "external"
  secretStore: "gcp_store"
  remoteRefPath: "cluster_01_env_extcred/env-extcred/envgene"
  create: true
  properties:
    - name: "username"
    - name: "password"
shared-cred: # shared credentials: external-ci-creds
  type: "external"
  secretStore: "maas_store"
  remoteRefPath: "cluster-01/env-ext-cred"
  create: false
  properties:
    - name: "username"
    - name: "password"
