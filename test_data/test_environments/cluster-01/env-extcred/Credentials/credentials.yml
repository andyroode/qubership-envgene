app-db-cred:
  type: "external"
  secretStore: "azure_store"
  remoteRefPath: "cluster_01_env_extcred/env-extcred"
  create: false
  properties:
    - name: "username"
    - name: "password"
app-dbaas-cred:
  type: "external"
  secretStore: "azure_store"
  create: false
  properties:
    - name: "username"
    - name: "password"
app-maas-cred:
  type: "external"
  secretStore: "azure_store"
  create: true
  properties:
    - name: "username"
    - name: "password"
app-sidecar-token:
  type: "external"
  secretStore: "vault_store"
  remoteRefPath: "{{ current_env.cloud }}/{{ current_env.name }}/envgene"
app-test-cred:
  type: "external"
  secretStore: "gcp_store"
  remoteRefPath: "cluster_01_env_extcred/env-extcred/envgene"
  create: true
  properties:
    - name: "username"
    - name: "password"
shared-cred:
  type: "external"
  secretStore: "maas_store"
  remoteRefPath: "cluster-01/env-ext-cred"
  create: false
  properties:
    - name: "username"
    - name: "password"
